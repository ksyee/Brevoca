services:
  postgres:
    image: postgres:16-alpine
    container_name: brevoca-postgres
    environment:
      POSTGRES_DB: brevoca
      POSTGRES_USER: brevoca
      POSTGRES_PASSWORD: brevoca
    ports:
      - "5432:5432"
    volumes:
      - ./postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: brevoca-redis
    ports:
      - "6379:6379"
    volumes:
      - ./redis-data:/data

  minio:
    image: minio/minio:RELEASE.2025-02-28T09-55-16Z
    container_name: brevoca-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: brevoca
      MINIO_ROOT_PASSWORD: brevoca123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - ./minio-data:/data
